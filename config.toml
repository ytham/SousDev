# SousDev configuration
# Prep, review, and plate your PRs automatically.
#
# This is the reference config. Copy and edit it for your project.
# The CLI auto-discovers this file by walking up from CWD.

provider = "anthropic"
model = "claude-opus-4-6"

# The repository to operate on. Required when running standalone.
# Accepts "owner/repo", "https://github.com/owner/repo.git", or
# "git@github.com:owner/repo.git".
target_repo = "your-org/your-repo"

# How "owner/repo" shorthands are expanded into clone URLs.
# "ssh"   → git@github.com:owner/repo.git
# "https" → https://github.com/owner/repo.git  (default)
git_method = "ssh"

# ---- System prompt ----
# Injected into every agent invocation (Claude via --system-prompt flag,
# codex/gemini prepended to the task text).
# Defaults to prompts/system.md when absent.
# Can be an inline string or a path to a .md file.
# system_prompt = "prompts/system.md"

# Shell commands the agent must never run.
# Rendered into the system prompt via the {{blocked_commands}} placeholder.
blocked_commands = []

[logging]
level = "info"    # "silent", "info", or "debug"
pretty = false

# ---- Prompt overrides (all optional) ----
# Paths are relative to this config file's directory.
# Omit a key to use the built-in default from prompts/.
#
# [prompts]
# code_review       = "prompts/code-review.md"
# review_feedback   = "prompts/review-feedback.md"
# pr_description    = "prompts/pr-description.md"
# pr_review         = "prompts/pr-review.md"
# pr_comment_response = "prompts/pr-comment-response.md"

# ---- Per-technique defaults (all optional) ----
[techniques.react]
max_iterations = 10

[techniques.reflexion]
max_trials = 3

[techniques.tree_of_thoughts]
branching = 3
strategy = "bfs"
max_depth = 4
score_threshold = 0.7

[techniques.self_consistency]
samples = 5
temperature = 0.8

[techniques.critique_loop]
max_rounds = 3

[techniques.skeleton_of_thought]
max_points = 8
parallel_expansion = true

[techniques.multi_agent_debate]
num_agents = 3
rounds = 2
aggregation = "judge"

# ---- Pipelines ----
# Define one or more workflows as [[workflows]] sections.
# Each workflow has a name, cron schedule, and one trigger mode:
#   github_issues       — fetch assigned issues, fix them, open PRs
#   github_prs          — review PRs where your review is requested
#   github_pr_responses — address reviewer comments on your open PRs
#   trigger             — run a shell command, act on its output

# ── Issue autofix workflow ─────────────────────────────────────────────
# Runs every hour. Fetches open issues, clones the repo, runs Claude to
# fix the issue, self-reviews the diff, and opens a pull request.
#
# Issue source: choose ONE of `github_issues` or `linear_issues`.

[[workflows]]
name = "issue-autofix"
schedule = "0 0 * * * *"      # every hour (sec min hour day month weekday)

# ── Option A: GitHub Issues (default) ─────────────────────────────────
[workflows.github_issues]
# repo defaults to target_repo — omit unless targeting a different repo
assignees = ["@me"]
labels = ["bug"]
limit = 3

# ── Option B: Linear Issues (uncomment to use instead of GitHub) ──────
# Requires LINEAR_API_KEY environment variable.
# Uses target_repo above for the git repo to clone.
# Comment out [workflows.github_issues] above before enabling.
#
# [workflows.linear_issues]
# team = "ENG"                   # Linear team key (required)
# states = ["Todo"]              # issue states to fetch (default: ["Todo"])
# labels = ["bug"]               # only issues with these labels
# assignee = "Alice"             # only issues assigned to this user
# limit = 3

[workflows.agent_loop]
technique = "claude-loop"
max_retries = 1               # 2 total attempts
max_review_rounds = 1         # 1 reviewer → agent feedback round

[workflows.agent_loop.external_agent]
timeout_secs = 300            # 5 minutes per agent invocation

[workflows.workspace]
base_branch = "main"
branch_prefix = "sousdev/issue-"
# workspaces_dir = "~/my-workspaces"  # default: ~/sousdev/workspaces

[workflows.pull_request]
draft = false
labels = ["harness", "bug-fix"]
# show_branding = true  # append "Automated by SousDev" to PR body (default true)

[workflows.retry]
max_attempts = 2
backoff_ms = 10000

# ── PR reviewer workflow ───────────────────────────────────────────────
# Runs every 30 minutes. Reviews PRs where your review has been
# requested. Posts inline comments and a summary.
#
# Re-review triggers:
#   - New commits pushed to the PR (head SHA changed)
#   - A "@<your-login>" comment posted since the last review

[[workflows]]
name = "pr-reviewer"
schedule = "0 */5 * * * *"

[workflows.github_prs]
# search = "label:needs-review"  # optional extra search qualifiers
limit = 5

[workflows.agent_loop]
technique = "claude-loop"        # required for PR review

[workflows.agent_loop.external_agent]
timeout_secs = 300

[workflows.workspace]
base_branch = "main"

# ── PR comment responder workflow ──────────────────────────────────────
# Runs every 15 minutes. Checks your open PRs for new reviewer comments,
# addresses them by editing code and pushing commits, then replies.

[[workflows]]
name = "pr-responder"
schedule = "0 */5 * * * *"

[workflows.github_pr_responses]
limit = 5

[workflows.agent_loop]
technique = "claude-loop"        # required for PR responses
max_retries = 1

[workflows.agent_loop.external_agent]
timeout_secs = 300

[workflows.workspace]
base_branch = "main"
